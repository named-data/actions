name: Build HTML documentation
on:
  workflow_call:
    inputs:
      submodules:
        description: 'Whether to checkout submodules'
        default: false
        type: boolean
      upload:
        description: 'Whether to upload an archive of the documentation'
        default: false
        type: boolean
      artifact-name:
        description: 'Artifact name to use for the uploaded documentation'
        default: docs
        type: string
      artifact-retention-days:
        description: 'Number of days after which the artifact will expire'
        default: 15
        type: number
      deploy:
        description: 'Whether to deploy the documentation'
        default: false
        type: boolean
      project:
        description: 'Project name for the deployment'
        type: string
      version:
        description: 'Project version for the deployment'
        type: string

permissions: {}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    # If deployment is enabled, ignore errors in jobs that are not required for deploying
    continue-on-error: ${{ inputs.deploy && !matrix.upload }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04]
        include:
          - os: ubuntu-24.04
            upload: ${{ inputs.upload || inputs.deploy }}
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ case(!!matrix.upload, 0, 1) }}
          submodules: ${{ inputs.submodules }}
          persist-credentials: false
          show-progress: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.x'
          enable-cache: false
      - name: Install dependencies
        env:
          CACHE_DIR: ${{ runner.temp }}
          JOB_NAME: Docs
        run: |
          find .jenkins.d/ -type f -name '[1-9]*.sh' -exec chmod -x '{}' +
          ./.jenkins
      - name: Build HTML documentation
        run: |
          ./waf --color=yes configure
          ./waf --color=yes build --targets=version.hpp || true
          ./waf --color=yes docs
      - name: Create archive
        if: matrix.upload
        env:
          ARCHIVE_NAME: ${{ inputs.artifact-name }}.tar.zst
        run: |
          rm -rf build/docs/{.buildinfo,.doctrees,Doxyfile,doxygen.conf}
          tar -caf "${ARCHIVE_NAME}" -C build/docs .
      - name: Upload archive
        if: matrix.upload
        id: upload
        uses: actions/upload-artifact@v7
        with:
          path: ${{ inputs.artifact-name }}.tar.zst
          archive: false
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}

  deploy:
    if: inputs.deploy
    needs: build
    uses: ./.github/workflows/docs-deployment.yml
    with:
      project: ${{ inputs.project }}
      version: ${{ inputs.version }}
      artifact-id: ${{ needs.build.outputs.artifact-id }}
    secrets: inherit
